<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App - Shivank Ranjan</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #222;
    color: #fff;
    text-align: center;
    transition: background 0.8s ease-in-out;
    background-size: cover;
    background-position: center;
  }

  /* Splash screen */
  #splash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #3f72af, #112d4e);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    color: #fff;
  }

  #splash img {
    width: 100px;
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  #splash h2 {
    margin-top: 20px;
    font-size: 22px;
  }

  #splash p {
    margin-top: 8px;
    font-size: 14px;
    opacity: 0.9;
  }

  .app {
    background: rgba(0,0,0,0.55);
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    text-align: center;
    font-size: 16px;
    margin-bottom: 10px;
  }

  button {
    background: #007bff;
    border: none;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    margin-bottom: 10px;
  }

  button:hover {
    background: #0056b3;
  }

  .weather img {
    width: 100px;
    height: 100px;
  }

  .details {
    margin-top: 10px;
    font-size: 16px;
    text-align: left;
  }

  footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 14px;
  }

</style>
</head>
<body>

<div id="splash">
  <img src="https://cdn-icons-png.flaticon.com/512/1163/1163661.png" alt="Weather Icon">
  <h2>Weather App</h2>
  <p>Made with ❤️ by Shivank Ranjan</p>
</div>

<div class="app" id="app" style="display:none;">
  <h1>🌤️ Weather App</h1>
  <input type="text" id="cityInput" placeholder="Enter city / village name...">
  <button onclick="getWeather()">Search</button>

  <div class="weather" id="weatherBox">
    <h2 id="location"></h2>
    <img id="icon" src="" alt="">
    <h3 id="temp"></h3>
    <p id="description"></p>
    <div class="details">
      <p>Humidity (नमी): <span id="humidity"></span></p>
      <p>Wind Speed (हवा की गति): <span id="wind"></span></p>
      <p>Pressure (दबाव): <span id="pressure"></span></p>
    </div>
  </div>
</div>

<footer>Made with ❤️ by <b>Shivank Ranjan</b></footer>

<script>
  const apiKey = "b1b15e88fa797225412429c1c50c122a1"; // Demo key
  const weatherBox = document.getElementById("weatherBox");
  const body = document.body;

  // Splash screen hide
  window.onload = () => {
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("app").style.display = "block";
      getLocationWeather();
    }, 3500);
  };

  // Get location weather
  function getLocationWeather() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;
        const res = await fetch(url);
        const data = await res.json();
        showWeather(data);
      }, () => {
        alert("Location access denied. Please enable GPS or search manually.");
      });
    }
  }

  // Manual search
  async function getWeather() {
    const city = document.getElementById("cityInput").value;
    if (!city) {
      alert("Please enter city or village name!");
      return;
    }
    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
    const res = await fetch(url);
    if (res.status === 404) {
      alert("Location not found. Try again.");
      return;
    }
    const data = await res.json();
    showWeather(data);
  }

  // Show weather info
  function showWeather(data) {
    document.getElementById("location").innerText = `${data.name}, ${data.sys.country}`;
    document.getElementById("temp").innerText = `${Math.round(data.main.temp)}°C`;
    document.getElementById("description").innerText = data.weather[0].description.toUpperCase();
    document.getElementById("humidity").innerText = `${data.main.humidity}%`;
    document.getElementById("wind").innerText = `${data.wind.speed} m/s`;
    document.getElementById("pressure").innerText = `${data.main.pressure} hPa`;

    const iconCode = data.weather[0].icon;
    document.getElementById("icon").src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

    const condition = data.weather[0].main.toLowerCase();
    if (condition.includes("rain")) {
      body.style.backgroundImage = "url('https://images.unsplash.com/photo-1523978591478-c753949ff840')";
    } else if (condition.includes("cloud")) {
      body.style.backgroundImage = "url('https://images.unsplash.com/photo-1503264116251-35a269479413')";
    } else if (condition.includes("clear")) {
      body.style.backgroundImage = "url('https://images.unsplash.com/photo-1502082553048-f009c37129b9')";
    } else if (condition.includes("snow")) {
      body.style.backgroundImage = "url('https://images.unsplash.com/photo-1608889175192-52d6c7ed9b23')";
    } else {
      body.style.backgroundImage = "url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29')";
    }
  }
</script>
</body>
</html>
